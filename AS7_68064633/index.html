<div class="form-container">

<h2>ณัฐขจร สุวรรณ์</h2>

<label>ชื่อ-นามสกุล:</label>
<input type="text" placeholder="กรุณากรอกชื่อ-นามสกุล">

<label>อีเมล:</label>
<input type="email" placeholder="example@domain.com">

<label>รหัสผ่าน:</label>
<input type="password">

<label>เพศ:</label>

<div class="gender-group">
<label><input type="radio" name="gender"> ชาย</label>
<label><input type="radio" name="gender"> หญิง</label>
</div>

<label>ตำแหน่ง:</label>
<select>
<option>Web Development</option>
<option>Programmer</option>
<option>Designer</option>
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Full Stack Developer</option>
<option>Mobile App Developer</option>
<option>UI/UX Designer</option>
<option>Graphic Designer</option>
<option>Data Analyst</option>
<option>System Administrator</option>
<option>Network Engineer</option>
<option>Software Tester</option>
</select>

<div class="button-group">
<button class="btn submit">ลงทะเบียน</button>
<button class="btn reset">ล้างข้อมูล</button>
</div>

</div>

<div class="video-control">
<button class="play" onclick="playVideo()">Play</button>
<button class="stop" onclick="stopVideo()">Stop</button>
</div>
